<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Elevator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard',sans-serif;
}

body{

    background:
    radial-gradient(circle at top left,#2563eb,transparent 30%),
    radial-gradient(circle at bottom right,#7c3aed,transparent 30%),
    #0f172a;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    color:white;
}

.app{

    width:360px;
    height:720px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:40px;

    overflow:hidden;

    position:relative;

    box-shadow:
    0 0 40px rgba(0,0,0,0.4),
    0 0 80px rgba(37,99,235,0.2);
}

.screen{

    width:100%;
    height:100%;

    position:absolute;
    top:0;
    left:0;

    padding:30px;

    display:none;

    flex-direction:column;
    align-items:center;

    opacity:0;

    transform:translateY(20px);

    transition:0.4s;
}

.active{

    display:flex;

    opacity:1;

    transform:translateY(0);
}

h1{

    margin-top:20px;

    font-size:34px;

    font-weight:bold;

    text-shadow:
    0 0 20px rgba(255,255,255,0.3);
}

.status-box{

    width:100%;

    margin-top:30px;

    background:rgba(255,255,255,0.07);

    border-radius:30px;

    padding:25px;

    text-align:center;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    inset 0 0 20px rgba(255,255,255,0.05);
}

.floor-text{

    margin-top:15px;

    font-size:60px;

    font-weight:bold;

    color:#60a5fa;

    text-shadow:
    0 0 10px #60a5fa,
    0 0 30px #60a5fa,
    0 0 50px #60a5fa;
}

.notice{

    margin-top:15px;

    color:#d1d5db;

    font-size:14px;
}

.floor-buttons{

    width:100%;

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:15px;

    margin-top:35px;
}

.floor-btn{

    padding:18px;

    border-radius:22px;

    background:rgba(255,255,255,0.07);

    border:1px solid rgba(255,255,255,0.08);

    text-align:center;

    font-size:20px;

    cursor:pointer;

    transition:0.25s;

    backdrop-filter:blur(10px);
}

.floor-btn:hover{

    transform:translateY(-3px);

    background:#2563eb;

    box-shadow:
    0 0 20px rgba(37,99,235,0.6);
}

.selected-floor{

    background:#2563eb;

    box-shadow:
    0 0 25px rgba(37,99,235,0.8);
}

.call-btn{

    width:100%;

    margin-top:25px;

    padding:18px;

    border:none;

    border-radius:25px;

    background:linear-gradient(
    145deg,
    #60a5fa,
    #2563eb
    );

    color:white;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;

    transition:0.25s;

    box-shadow:
    0 0 25px rgba(37,99,235,0.5);
}

.call-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 0 35px rgba(37,99,235,0.8);
}

.elevator-container{

    width:150px;
    height:450px;

    margin-top:20px;

    position:relative;

    border-radius:30px;

    overflow:hidden;

    background:
    linear-gradient(
    to bottom,
    rgba(255,255,255,0.08),
    rgba(255,255,255,0.03)
    );

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    inset 0 0 20px rgba(255,255,255,0.05);
}

.elevator-line{

    width:100%;
    height:2px;

    background:rgba(255,255,255,0.08);

    position:absolute;
}

.elevator{

    width:90px;
    height:90px;

    background:linear-gradient(
    145deg,
    #93c5fd,
    #2563eb
    );

    position:absolute;

    left:30px;
    bottom:0;

    border-radius:25px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;

    transition:all linear;

    box-shadow:
    0 0 25px rgba(96,165,250,0.7),
    inset 0 0 15px rgba(255,255,255,0.3);

    animation:float 2s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-5px);
    }

    100%{
        transform:translateY(0px);
    }
}

.time-text{

    margin-top:25px;

    font-size:24px;

    font-weight:bold;
}

.moving-floor{

    margin-top:15px;

    font-size:22px;

    color:#93c5fd;

    text-shadow:
    0 0 10px rgba(147,197,253,0.7);
}

.arrival-animation{

    margin-top:100px;

    width:180px;
    height:180px;

    border-radius:50%;

    background:
    radial-gradient(circle,#22c55e,#15803d);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:90px;

    animation:pulse 1s infinite;

    box-shadow:
    0 0 30px rgba(34,197,94,0.6),
    0 0 60px rgba(34,197,94,0.5),
    0 0 100px rgba(34,197,94,0.4);
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

.arrival-text{

    margin-top:40px;

    font-size:36px;

    font-weight:bold;
}

.sub-text{

    margin-top:15px;

    color:#d1d5db;

    font-size:18px;
}

.confirm-btn{

    width:100%;

    margin-top:40px;

    padding:18px;

    border:none;

    border-radius:25px;

    background:linear-gradient(
    145deg,
    #22c55e,
    #16a34a
    );

    color:white;

    font-size:20px;

    font-weight:bold;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<!-- 화면1 -->
<div class="screen active" id="screen1">

    <h1>Smart Elevator</h1>

    <div class="status-box">

        현재 엘리베이터 위치

        <div class="floor-text">
            <span id="currentFloor"></span>층
        </div>

    </div>

    <div class="notice">
        ※ 2층과 3층은 계단 이용 권장
    </div>

    <div class="floor-buttons" id="floorButtons"></div>

    <button class="call-btn" onclick="callElevator()">
        엘리베이터 호출
    </button>

</div>

<!-- 화면2 -->
<div class="screen" id="screen2">

    <h1>엘리베이터 이동 중</h1>

    <div class="elevator-container">

        <div class="elevator-line" style="top:10%"></div>
        <div class="elevator-line" style="top:20%"></div>
        <div class="elevator-line" style="top:30%"></div>
        <div class="elevator-line" style="top:40%"></div>
        <div class="elevator-line" style="top:50%"></div>
        <div class="elevator-line" style="top:60%"></div>
        <div class="elevator-line" style="top:70%"></div>
        <div class="elevator-line" style="top:80%"></div>
        <div class="elevator-line" style="top:90%"></div>

        <div class="elevator" id="elevator">
            ↑
        </div>

    </div>

    <div class="time-text">
        예상 도착 시간 :
        <span id="arrivalTime"></span>초
    </div>

    <div class="moving-floor">
        현재 이동 층 :
        <span id="movingFloor"></span>층
    </div>

</div>

<!-- 화면3 -->
<div class="screen" id="screen3">

    <div class="arrival-animation">
        ✓
    </div>

    <div class="arrival-text">
        엘리베이터 도착!
    </div>

    <div class="sub-text">
        탑승해주세요.
    </div>

    <button class="confirm-btn" onclick="goHome()">
        확인
    </button>

</div>

</div>

<script>

const possibleFloors = [1,4,5,6,7,8,9,10];

let currentFloor =
possibleFloors[
Math.floor(Math.random()*possibleFloors.length)
];

document.getElementById("currentFloor")
.textContent = currentFloor;

let selectedFloor = null;

const floorButtons =
document.getElementById("floorButtons");

possibleFloors.forEach(floor=>{

    const btn = document.createElement("div");

    btn.classList.add("floor-btn");

    btn.textContent = floor + "층";

    btn.onclick = ()=>{

        document.querySelectorAll(".floor-btn")
        .forEach(b=>b.classList.remove("selected-floor"));

        btn.classList.add("selected-floor");

        selectedFloor = floor;
    };

    floorButtons.appendChild(btn);
});

function callElevator(){

    if(selectedFloor == null){

        alert("층을 선택해주세요!");
        return;
    }

    if(selectedFloor == currentFloor){

        alert("이미 해당 층에 있습니다!");
        return;
    }

    document.getElementById("screen1")
    .classList.remove("active");

    document.getElementById("screen2")
    .classList.add("active");

    const floorHeight = 3;

    const speed = 100 / 60;

    const distance =
    Math.abs(selectedFloor-currentFloor)
    * floorHeight;

    const time =
    Math.ceil(distance/speed);

    let remainingTime = time;

    document.getElementById("arrivalTime")
    .textContent = remainingTime;

    const elevator =
    document.getElementById("elevator");

    const moveHeight =
    (selectedFloor-1) * 34;

    elevator.style.transitionDuration =
    time + "s";

    elevator.style.bottom =
    moveHeight + "px";

    let movingFloor = currentFloor;

    document.getElementById("movingFloor")
    .textContent = movingFloor;

    const direction =
    selectedFloor > currentFloor ? 1 : -1;

    const floorInterval =
    (time*1000) /
    Math.abs(selectedFloor-currentFloor);

    const floorTimer = setInterval(()=>{

        if(movingFloor != selectedFloor){

            movingFloor += direction;

            document.getElementById("movingFloor")
            .textContent = movingFloor;
        }

    },floorInterval);

    const timer = setInterval(()=>{

        remainingTime--;

        document.getElementById("arrivalTime")
        .textContent = remainingTime;

        if(remainingTime <= 0){

            clearInterval(timer);
            clearInterval(floorTimer);

            document.getElementById("screen2")
            .classList.remove("active");

            document.getElementById("screen3")
            .classList.add("active");

            currentFloor = selectedFloor;

            document.getElementById("currentFloor")
            .textContent = currentFloor;
        }

    },1000);
}

function goHome(){

    document.getElementById("screen3")
    .classList.remove("active");

    document.getElementById("screen1")
    .classList.add("active");
}

</script>

</body>
</html>
