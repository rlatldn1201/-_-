<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Elevator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{

    background:linear-gradient(
        -45deg,
        #111827,
        #1e3a8a,
        #0f172a,
        #2563eb
    );

    background-size:400% 400%;

    animation:bgAnimation 10s ease infinite;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    color:white;

    overflow:hidden;
}

@keyframes bgAnimation{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

.app{

    width:360px;
    height:700px;

    background:rgba(31,41,55,0.92);

    backdrop-filter:blur(10px);

    border-radius:35px;

    overflow:hidden;

    position:relative;

    box-shadow:
        0 0 30px rgba(0,0,0,0.5),
        0 0 60px rgba(59,130,246,0.3);
}

.screen{

    width:100%;
    height:100%;

    position:absolute;

    top:0;
    left:0;

    padding:30px 25px;

    display:none;

    flex-direction:column;

    align-items:center;
}

.active{
    display:flex;
}

h1{

    margin-top:20px;

    font-size:32px;

    font-weight:bold;

    text-shadow:
        0 0 15px rgba(255,255,255,0.3);
}

.status-box{

    width:100%;

    background:rgba(55,65,81,0.9);

    padding:20px;

    border-radius:25px;

    text-align:center;

    margin-top:25px;

    box-shadow:
        inset 0 0 20px rgba(255,255,255,0.05),
        0 0 20px rgba(0,0,0,0.3);
}

.floor-text{

    font-size:60px;

    font-weight:bold;

    margin-top:10px;

    color:#60a5fa;

    text-shadow:
        0 0 10px #60a5fa,
        0 0 20px #60a5fa,
        0 0 40px #60a5fa;
}

.notice{

    margin-top:15px;

    font-size:14px;

    color:#d1d5db;
}

select{

    width:100%;

    padding:16px;

    margin-top:30px;

    border:none;

    border-radius:18px;

    font-size:18px;

    background:#e5e7eb;
}

button{

    width:100%;

    padding:16px;

    margin-top:25px;

    border:none;

    border-radius:18px;

    background:linear-gradient(
        145deg,
        #60a5fa,
        #2563eb
    );

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.2s;

    box-shadow:
        0 0 20px rgba(59,130,246,0.5);
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
        0 0 30px rgba(59,130,246,0.7);
}

button:active{
    transform:scale(0.95);
}

.elevator-container{

    width:180px;
    height:450px;

    margin-top:20px;

    position:relative;

    overflow:hidden;

    display:flex;
    justify-content:center;
}

.elevator{

    width:120px;
    height:120px;

    background-image:url("elevator.png");

    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;

    position:absolute;

    bottom:0;

    transition:all linear;

    animation:float 2s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-5px);
    }

    100%{
        transform:translateY(0px);
    }
}

.time-text{

    margin-top:20px;

    font-size:24px;

    font-weight:bold;
}

.moving-floor{

    margin-top:15px;

    font-size:22px;

    color:#93c5fd;

    text-shadow:
        0 0 10px rgba(147,197,253,0.8);
}

.arrival-animation{

    margin-top:80px;

    width:180px;
    height:180px;

    border-radius:50%;

    background:linear-gradient(
        145deg,
        #22c55e,
        #16a34a
    );

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:85px;

    animation:pulse 1s infinite;

    box-shadow:
        0 0 40px rgba(34,197,94,0.7);
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

.arrival-text{

    margin-top:40px;

    font-size:34px;

    font-weight:bold;

    text-shadow:
        0 0 15px rgba(255,255,255,0.4);
}

.sub-text{

    margin-top:15px;

    font-size:18px;

    color:#d1d5db;
}

</style>
</head>

<body>

<div class="app">

    <!-- 화면 1 -->
    <div class="screen active" id="screen1">

        <h1>Smart Elevator</h1>

        <div class="status-box">

            현재 엘리베이터 위치

            <div class="floor-text">
                <span id="currentFloor"></span>층
            </div>

        </div>

        <div class="notice">
            ※ 2층과 3층은 계단 이용 권장
        </div>

        <select id="userFloor">
            <option value="">층 선택</option>
        </select>

        <button onclick="callElevator()">
            엘리베이터 호출
        </button>

    </div>

    <!-- 화면 2 -->
    <div class="screen" id="screen2">

        <h1>엘리베이터 이동 중</h1>

        <div class="elevator-container">

            <div class="elevator" id="elevator"></div>

        </div>

        <div class="time-text">
            예상 도착 시간 :
            <span id="arrivalTime"></span>초
        </div>

        <div class="moving-floor">
            현재 이동 층 :
            <span id="movingFloor"></span>층
        </div>

    </div>

    <!-- 화면 3 -->
    <div class="screen" id="screen3">

        <div class="arrival-animation">
            ✓
        </div>

        <div class="arrival-text">
            엘리베이터 도착!
        </div>

        <div class="sub-text">
            탑승해주세요.
        </div>

        <button onclick="goHome()">
            확인
        </button>

    </div>

</div>

<script>

    // 층 선택 생성
    const select = document.getElementById("userFloor");

    for(let i = 1; i <= 10; i++){

        // 2층, 3층 제외
        if(i == 2 || i == 3){
            continue;
        }

        let option = document.createElement("option");

        option.value = i;
        option.textContent = i + "층";

        select.appendChild(option);
    }

    // 가능한 층
    const possibleFloors = [1,4,5,6,7,8,9,10];

    // 랜덤 시작 층
    let currentFloor =
        possibleFloors[
            Math.floor(Math.random() * possibleFloors.length)
        ];

    document.getElementById("currentFloor")
        .textContent = currentFloor;

    function callElevator(){

        const targetFloor =
            parseInt(document.getElementById("userFloor").value);

        if(!targetFloor){

            alert("층을 선택해주세요!");
            return;
        }

        // 같은 층 예외 처리
        if(targetFloor == currentFloor){

            alert("이미 해당 층에 엘리베이터가 있습니다!");
            return;
        }

        // 화면 전환
        document.getElementById("screen1")
            .classList.remove("active");

        document.getElementById("screen2")
            .classList.add("active");

        // 층 높이
        const floorHeight = 3;

        // 속도
        const speed = 100 / 60;

        // 거리
        const distance =
            Math.abs(targetFloor - currentFloor) * floorHeight;

        // 예상 시간
        const time =
            Math.ceil(distance / speed);

        let remainingTime = time;

        document.getElementById("arrivalTime")
            .textContent = remainingTime;

        // 엘리베이터 이동
        const elevator =
            document.getElementById("elevator");

        const moveHeight =
            (targetFloor - 1) * 34;

        elevator.style.transitionDuration =
            time + "s";

        elevator.style.bottom =
            moveHeight + "px";

        // 현재 이동 층
        let movingFloor = currentFloor;

        document.getElementById("movingFloor")
            .textContent = movingFloor;

        // 방향
        const direction =
            targetFloor > currentFloor ? 1 : -1;

        // 층 이동 간격
        const floorInterval =
            (time * 1000) /
            Math.abs(targetFloor - currentFloor);

        // 층 변경
        const floorTimer = setInterval(() => {

            if(movingFloor != targetFloor){

                movingFloor += direction;

                document.getElementById("movingFloor")
                    .textContent = movingFloor;
            }

        }, floorInterval);

        // 시간 감소
        const timer = setInterval(() => {

            remainingTime--;

            document.getElementById("arrivalTime")
                .textContent = remainingTime;

            // 도착
            if(remainingTime <= 0){

                clearInterval(timer);
                clearInterval(floorTimer);

                document.getElementById("screen2")
                    .classList.remove("active");

                document.getElementById("screen3")
                    .classList.add("active");

                currentFloor = targetFloor;

                document.getElementById("currentFloor")
                    .textContent = currentFloor;
            }

        }, 1000);

    }

    function goHome(){

        document.getElementById("screen3")
            .classList.remove("active");

        document.getElementById("screen1")
            .classList.add("active");
    }

</script>

</body>
</html>
