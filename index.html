<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Elevator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

body {
  background: #f5f5f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.app {
  width: 360px;
  background: #fff;
  border-radius: 24px;
  border: 1px solid #e8e8e8;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 32px 24px;
}
.screen.active { display: flex; }

.app-title { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; align-self: flex-start; }
.app-subtitle { font-size: 13px; color: #999; align-self: flex-start; margin-bottom: 24px; }

.status-card {
  width: 100%;
  background: #f7f7f7;
  border-radius: 16px;
  padding: 22px;
  border: 1px solid #efefef;
  margin-bottom: 8px;
}
.status-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
.floor-display { font-size: 64px; font-weight: 600; color: #111; line-height: 1.1; margin-top: 6px; }
.floor-unit { font-size: 24px; font-weight: 400; color: #aaa; }

.hint { font-size: 12px; color: #ccc; margin-bottom: 24px; align-self: flex-start; }

select {
  width: 100%;
  padding: 13px 16px;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  font-size: 15px;
  background: #fff;
  color: #111;
  outline: none;
  margin-bottom: 12px;
  cursor: pointer;
  appearance: auto;
}
select:focus { border-color: #aaa; }

.call-btn {
  width: 100%;
  padding: 15px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.call-btn:hover { opacity: 0.82; }
.call-btn:active { transform: scale(0.98); }

.screen2-title { font-size: 20px; font-weight: 600; color: #111; align-self: flex-start; margin-bottom: 4px; }
.screen2-sub { font-size: 13px; color: #999; align-self: flex-start; margin-bottom: 24px; }

.shaft {
  width: 80px;
  height: 340px;
  position: relative;
  background: #f7f7f7;
  border-radius: 16px;
  border: 1px solid #efefef;
  overflow: hidden;
  margin: 0 auto 20px;
}
.shaft-line {
  position: absolute; left: 0; right: 0;
  height: 1px; background: #efefef;
}
.cab {
  width: 60px; height: 60px;
  background: #111;
  border-radius: 12px;
  position: absolute;
  left: 10px; bottom: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  transition: bottom linear;
}

.info-row { display: flex; gap: 12px; width: 100%; }
.info-card {
  flex: 1;
  background: #f7f7f7;
  border-radius: 12px;
  padding: 16px;
  border: 1px solid #efefef;
}
.info-card-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.info-card-value { font-size: 24px; font-weight: 600; color: #111; }
.info-card-unit { font-size: 14px; color: #aaa; font-weight: 400; }

.arrival-wrap {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: 100%; padding: 16px 0;
}
.check-circle {
  width: 96px; height: 96px;
  border-radius: 50%;
  background: #f7f7f7;
  border: 1px solid #e8e8e8;
  display: flex; align-items: center; justify-content: center;
  font-size: 44px;
  margin-bottom: 24px;
}
.arrival-title { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 8px; }
.arrival-sub { font-size: 14px; color: #999; margin-bottom: 20px; }
.floor-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 16px;
  border-radius: 999px;
  background: #f7f7f7;
  border: 1px solid #e8e8e8;
  font-size: 13px; color: #666;
  margin-bottom: 40px;
}
.confirm-btn {
  width: 100%; padding: 15px;
  background: #111; color: #fff;
  border: none; border-radius: 14px;
  font-size: 15px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s;
}
.confirm-btn:hover { opacity: 0.82; }
.confirm-btn:active { transform: scale(0.98); }
</style>
</head>
<body>

<div class="app">

  <!-- 화면 1 -->
  <div class="screen active" id="screen1">
    <div class="app-title">Smart Elevator</div>
    <div class="app-subtitle">현재 위치를 확인하고 호출하세요</div>

    <div class="status-card">
      <div class="status-label">현재 엘리베이터 위치</div>
      <div class="floor-display">
        <span id="currentFloor"></span><span class="floor-unit">층</span>
      </div>
    </div>

    <div class="hint" style="margin-top:8px;">※ 시작 위치는 랜덤 (2·3층 제외)</div>

    <select id="userFloor">
      <option value="">층 선택</option>
    </select>

    <button class="call-btn" onclick="callElevator()">엘리베이터 호출</button>
  </div>

  <!-- 화면 2 -->
  <div class="screen" id="screen2">
    <div class="screen2-title">이동 중</div>
    <div class="screen2-sub">잠시만 기다려주세요</div>

    <div class="shaft" id="shaft">
      <div class="shaft-line" style="top:10%"></div>
      <div class="shaft-line" style="top:20%"></div>
      <div class="shaft-line" style="top:30%"></div>
      <div class="shaft-line" style="top:40%"></div>
      <div class="shaft-line" style="top:50%"></div>
      <div class="shaft-line" style="top:60%"></div>
      <div class="shaft-line" style="top:70%"></div>
      <div class="shaft-line" style="top:80%"></div>
      <div class="shaft-line" style="top:90%"></div>
      <div class="cab" id="elevator">🛗</div>
    </div>

    <div class="info-row">
      <div class="info-card">
        <div class="info-card-label">예상 도착</div>
        <div class="info-card-value">
          <span id="arrivalTime">—</span><span class="info-card-unit">초</span>
        </div>
      </div>
      <div class="info-card">
        <div class="info-card-label">현재 층</div>
        <div class="info-card-value">
          <span id="movingFloor">—</span><span class="info-card-unit">층</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 화면 3 -->
  <div class="screen" id="screen3">
    <div class="arrival-wrap">
      <div class="check-circle">✓</div>
      <div class="arrival-title">도착했습니다</div>
      <div class="arrival-sub">탑승해주세요</div>
      <div class="floor-badge">📍 <span id="arrivedFloor">—</span>층 도착</div>
      <button class="confirm-btn" onclick="goHome()">확인</button>
    </div>
  </div>

</div>

<script>
  const select = document.getElementById("userFloor");
  for (let i = 1; i <= 10; i++) {
    const o = document.createElement("option");
    o.value = i;
    o.textContent = i + "층";
    select.appendChild(o);
  }

  const possibleFloors = [1, 4, 5, 6, 7, 8, 9, 10];
  let currentFloor = possibleFloors[Math.floor(Math.random() * possibleFloors.length)];
  document.getElementById("currentFloor").textContent = currentFloor;

  // 층 번호 → shaft 내 bottom px 계산
  function floorToBottom(floor, shaftH) {
    const cabH = 60;
    const usable = shaftH - cabH - 20;
    return 10 + (floor - 1) * (usable / 9);
  }

  function showScreen(id) {
    ["screen1", "screen2", "screen3"].forEach(s => {
      document.getElementById(s).classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
  }

  function callElevator() {
    const targetFloor = parseInt(document.getElementById("userFloor").value);
    if (!targetFloor) { alert("층을 선택해주세요!"); return; }
    if (targetFloor === currentFloor) { alert("이미 해당 층에 있습니다!"); return; }

    showScreen("screen2");

    const elevator = document.getElementById("elevator");
    const shaftH = document.getElementById("shaft").clientHeight;

    // 현재 층 위치에서 시작 (transition 없이 즉시 배치)
    elevator.style.transition = "none";
    elevator.style.bottom = floorToBottom(currentFloor, shaftH) + "px";

    const floorDiff = Math.abs(targetFloor - currentFloor);
    const time = Math.ceil(floorDiff * 1.5);

    document.getElementById("arrivalTime").textContent = time;
    document.getElementById("movingFloor").textContent = currentFloor;

    // 한 프레임 뒤에 transition 켜고 목적지로 이동
    requestAnimationFrame(() => requestAnimationFrame(() => {
      elevator.style.transition = "bottom " + time + "s linear";
      elevator.style.bottom = floorToBottom(targetFloor, shaftH) + "px";
    }));

    let remaining = time;
    let movingFloor = currentFloor;
    const direction = targetFloor > currentFloor ? 1 : -1;
    const floorInterval = (time * 1000) / floorDiff;

    const floorTimer = setInterval(() => {
      if (movingFloor !== targetFloor) {
        movingFloor += direction;
        document.getElementById("movingFloor").textContent = movingFloor;
      }
    }, floorInterval);

    const timer = setInterval(() => {
      remaining--;
      document.getElementById("arrivalTime").textContent = remaining;
      if (remaining <= 0) {
        clearInterval(timer);
        clearInterval(floorTimer);
        currentFloor = targetFloor;
        document.getElementById("currentFloor").textContent = currentFloor;
        document.getElementById("arrivedFloor").textContent = currentFloor;
        showScreen("screen3");
      }
    }, 1000);
  }

  function goHome() { showScreen("screen1"); }
</script>

</body>
</html>
